<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شمبر للعطور</title>
<style>
body{margin:0;font-family:Arial;background:#10202d;color:#f7f7f7;overflow-x:hidden;}

/* Loader */
#loader{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);
  display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;
}
.snake{
  width:60px;height:60px;border:5px solid #c7a667;border-radius:50%;border-top-color:transparent;
  animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.loader-text{font-size:24px;font-weight:bold;text-shadow:0 0 5px #c7a667,0 0 15px #c7a667;margin-top:10px;}

/* Header */
header{padding:15px;text-align:center;position:relative;z-index:1;}

/* زر السلة واضح وكبير */
.cartBtn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#c7a667;
  color:#10202d;
  font-size:28px;
  padding:15px 20px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  z-index:999;
  box-shadow:0 0 10px #c7a667;
}

/* Nav */
.nav{display:flex;justify-content:center;gap:10px;padding:10px;background:#10202d;z-index:1;}
.nav button{background:#c7a667;border:none;padding:8px 15px;color:#10202d;border-radius:20px;cursor:pointer;}

/* Container */
.container{padding:15px;}
.products{display:none;grid-template-columns:repeat(2,1fr);gap:15px;min-height:300px;}
.products.active{display:grid;animation:fade 0.4s;}
.card{background: rgba(16,32,45,0.85);padding:10px;border-radius:10px;text-align:center;transition:0.3s;border:1px solid #c7a667;}
.card:hover{transform:scale(1.05);}
.product-img{width:100%;height:120px;object-fit:cover;border-radius:10px;}
.desc{font-size:12px;opacity:0.9;}
.price{color:#c7a667;font-weight:bold;}
button{margin-top:8px;padding:7px;border:none;background:#c7a667;color:#10202d;border-radius:5px;cursor:pointer;}

/* Cart Popup أسفل منتصف الشاشة */
.cartPopup{
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
  background:rgba(16,32,45,0.95); padding:15px; border-radius:15px;
  z-index:998; border:1px solid #c7a667; width:95%; max-width:400px;
  display:none;
}
.cartPopup h3{text-align:center;margin-bottom:10px;}
.cartPopup #cartItems p{margin:5px 0;}
.cartPopup #total{font-weight:bold;margin-top:10px;text-align:center;}
.cartPopup input{width:100%;margin:5px 0;padding:8px;border-radius:5px;border:none;}
.cartPopup button{width:32%;margin:3px 1%;}

/* Toast */
.toast{position:fixed;top:20px;right:20px;background:#c7a667;padding:10px;border-radius:5px;display:none;color:#10202d;}

/* Animations */
@keyframes fade{0%{opacity:0;}100%{opacity:1;}}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="snake"></div>
  <div class="loader-text">شمبر</div>
</div>

<header>✨ شمبر ✨</header>

<div class="nav">
<button onclick="switchSection('men')">رجالي</button>
<button onclick="switchSection('women')">نسائي</button>
<button onclick="switchSection('unisex')">للجنسين</button>
</div>

<div class="container">
<div id="men" class="products active"></div>
<div id="women" class="products"></div>
<div id="unisex" class="products"></div>
</div>

<!-- زر السلة -->
<button class="cartBtn" onclick="toggleCart()">🛒</button>

<!-- Cart Popup -->
<div class="cartPopup" id="cartPopup">
<h3>🛒 السلة</h3>
<div id="cartItems"><p>السلة فارغة</p></div>
<h4 id="total"></h4>
<input type="text" id="userName" placeholder="اسمك">
<input type="text" id="userPhone" placeholder="رقم الهاتف">
<button onclick="sendOrder()">إتمام الطلب</button>
<button onclick="toggleCart()">❌ إغلاق</button>
</div>

<div class="toast" id="toast">تمت الإضافة ✅</div>

<script>
const products=[
{ id:1,name:"باريس",price:50,image:"kimo1.jpg",desc:"عطر رجالي",category:"men"},
{ id:2,name:"الاحلام",price:200,image:"kimo2.jpg",desc:"عطر رجالي",category:"men"},
{ id:3,name:"هدوئ اليلي",price:170,image:"kimo3.jpg",desc:"عطر رجالي",category:"men"},
{ id:4,name:"الاسد",price:130,image:"kimo4.jpg",desc:"عطر رجالي",category:"men"},
{ id:5,name:"الفارس",price:80,image:"kimo5.jpg",desc:"عطر رجالي",category:"men"},
{ id:6,name:"الانوثه",price:250,image:"kimo6.jpg",desc:"عطر نسائي",category:"women"},
{ id:7,name:"الاميره",price:180,image:"kimo7.jpg",desc:"عطر نسائي",category:"women"},
{ id:8,name:"زهرة الوتس",price:90,image:"kimo8.jpg",desc:"عطر نسائي",category:"women"},
{ id:9,name:"رياح الجنوب",price:70,image:"kimo9.jpg",desc:"عطر نسائي",category:"women"},
{ id:10,name:"البنفسج",price:65,image:"kimo10.jpg",desc:"عطر نسائي",category:"women"},
{ id:11,name:"Tom Ford Oud",price:80,image:"kimo11.jpg",desc:"للجنسين",category:"unisex"},
{ id:12,name:"Bleu de Chanel",price:60,image:"kimo12.jpg",desc:"للجنسين",category:"unisex"}
];

let cart=[];

function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}

function renderProducts(){
["men","women","unisex"].forEach(cat=>{
let container=document.getElementById(cat);
container.innerHTML="";
products.filter(p=>p.category===cat).forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" class="product-img">
<h4>${p.name}</h4>
<p class="desc">${p.desc}</p>
<p class="price">${p.price}$</p>
<button onclick="addToCart(${p.id})">إضافة</button>
</div>`;
});
});
}

/* Cart */
function displayCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
if(cart.length===0){
  div.innerHTML="<p>السلة فارغة</p>";
  document.getElementById("total").innerText="";
  return;
}
let total=0;
cart.forEach(i=>{
  total+=i.price*i.qty;
  div.innerHTML+=`<p>📦 ${i.name} × ${i.qty} = ${i.price*i.qty}$</p>`;
});
document.getElementById("total").innerText="💵 الإجمالي: "+total+"$";
}

function toggleCart(){
let c=document.getElementById("cartPopup");
displayCart(); 
c.style.display = c.style.display==="block" ? "none" : "block";
}

function addToCart(id){
let product=products.find(p=>p.id===id);
let item=cart.find(i=>i.id===id);
if(item){item.qty++;}else{cart.push({...product,qty:1});}
saveCart();
showToast();
}

function showToast(){
let t=document.getElementById("toast");
t.style.display="block"; 
setTimeout(()=>t.style.display="none",1500);
}

/* Loader & Switch Sections */
const loader=document.getElementById("loader");
function switchSection(cat){
  loader.style.display="flex";
  let randomTime=Math.floor(Math.random()*5000)+1000;
  setTimeout(()=>{
    document.querySelectorAll(".products").forEach(s=>s.classList.remove("active"));
    document.getElementById(cat).classList.add("active");
    loader.style.display="none";
  }, randomTime);
}

/* Send Order via WhatsApp */
function sendOrder(){
  let name=document.getElementById("userName").value;
  let phone=document.getElementById("userPhone").value;
  if(!name||!phone){alert("املأ الاسم ورقم الهاتف");return;}
  if(cart.length===0){alert("السلة فارغة");return;}
  let message="طلب جديد من شمبر للعطور:\n";
  message+="الاسم: "+name+"\nرقم الهاتف: "+phone+"\n\n";
  let total=0;
  cart.forEach(item=>{
    message+=`• ${item.name} × ${item.qty} = ${item.price*item.qty}$\n`;
    total+=item.price*item.qty;
  });
  message+="\n💵 المجموع: "+total+"$";
  window.open("https://wa.me/249994501781?text="+encodeURIComponent(message),"_blank");

  // مسح السلة بعد الطلب
  cart=[];
  saveCart();
  displayCart();
  toggleCart();
}

renderProducts();
loader.style.display="none";
</script>
</body>
</html>
