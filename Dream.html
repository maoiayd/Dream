<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0f172a;
color:#fff;
}

/* الهيدر */
header{
background:#ff6a00;
padding:15px;
text-align:center;
font-size:22px;
}

/* الأقسام فوق */
.tabs{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
position:sticky;
top:0;
z-index:10;
}

.tab{
cursor:pointer;
padding:8px 15px;
border-radius:8px;
transition:0.3s;
}

.tab.active{
background:#ff6a00;
}

/* المنتجات */
.container{
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* أنيميشن */
.fade{
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* الكرت */
.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:#ff9800;
}

button{
background:#ff6a00;
border:none;
padding:6px;
color:#fff;
border-radius:5px;
cursor:pointer;
}

/* السلة */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6a00;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:#1e293b;
padding:15px;
transition:0.3s;
overflow:auto;
}

.cart.active{
right:0;
}

.order-btn{
background:#22c55e;
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
}

/* إشعار الإضافة */
#notif{
position:fixed;
top:20px;
right:50%;
transform:translateX(50%);
background:#22c55e;
color:#fff;
padding:10px 20px;
border-radius:8px;
display:none;
font-weight:bold;
z-index:1000;
}
</style>
</head>

<body>

<header>🍔 Dream Restaurant</header>

<!-- الأقسام -->
<div class="tabs">
<div class="tab active" onclick="load('food',this)">🍔 مأكولات</div>
<div class="tab" onclick="load('dessert',this)">🍰 حلويات</div>
<div class="tab" onclick="load('juice',this)">🧃 عصائر</div>
</div>

<!-- المنتجات -->
<div class="container">
<div class="grid fade" id="grid"></div>
</div>

<!-- السلة -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>
<div class="cart" id="cart">
<h3>السلة</h3>
<div id="cartItems"></div>
<input id="address" placeholder="اكتب عنوان إضافي (اختياري)">
<button class="order-btn" onclick="sendOrder()">🚚 توصيل الطلب</button>
</div>

<!-- إشعار الإضافة -->
<div id="notif">تمت الإضافة للسلة</div>

<script>
const data={
food:[
["برجر",2500,"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"],
["شاورما",2000,"https://images.unsplash.com/photo-1604908176997-431c6f2d7f1c"],
["فراخ",2200,"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"],
["بطاطس",800,"https://images.unsplash.com/photo-1586190848861-99aa4a171e90"],
["بيتزا",3500,"https://images.unsplash.com/photo-1548365328-9f547fb0953d"],
["ساندوتش",1500,"https://images.unsplash.com/photo-1550547660-d9450f859349"],
["نقانق",1800,"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"],
["برجر دبل",3000,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
],
dessert:[
["كيك",1500,"https://images.unsplash.com/photo-1605478039217-7b8c5c8a2b9d"],
["كنافة",1800,"https://images.unsplash.com/photo-1589308078059-be1415eab4c3"],
["تشيز كيك",2000,"https://images.unsplash.com/photo-1565958011703-44f9829ba187"],
["بقلاوة",1700,"https://images.unsplash.com/photo-1617191515003-7cde6b1d3c47"],
["دونات",1000,"https://images.unsplash.com/photo-1505253210343-6c2f1f7d3c5d"],
["كوكيز",900,"https://images.unsplash.com/photo-1499636136210-6f4ee915583e"],
["آيسكريم",800,"https://images.unsplash.com/photo-1505253210343-6c2f1f7d3c5d"],
["بسبوسة",1200,"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"]
],
juice:[
["برتقال",1000,"https://images.unsplash.com/photo-1553531889-56cc480ac5cb"],
["مانجو",1200,"https://images.unsplash.com/photo-1577805947697-89e18249d767"],
["فراولة",1100,"https://images.unsplash.com/photo-1551024709-8f23befc6f87"],
["ليمون",800,"https://images.unsplash.com/photo-1524594154908-eddc3c1f6f5e"],
["كوكتيل",1500,"https://images.unsplash.com/photo-1551024709-8f23befc6f87"],
["أناناس",1300,"https://images.unsplash.com/photo-1502741338009-cac2772e18bc"],
["جوافة",1000,"https://images.unsplash.com/photo-1524594154908-eddc3c1f6f5e"],
["رمان",1400,"https://images.unsplash.com/photo-1505253210343-6c2f1f7d3c5d"]
]
};

let cart=[];

// تحميل المنتجات
function load(type,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

let grid=document.getElementById("grid");
grid.classList.remove("fade");

setTimeout(()=>{
grid.innerHTML="";
data[type].forEach(i=>{
grid.innerHTML+=`
<div class="card">
<img src="${i[2]}">
<div class="card-content">
<h4>${i[0]}</h4>
<p class="price">${i[1]} جنيه</p>
<button onclick="add('${i[0]}',${i[1]})">إضافة</button>
</div>
</div>
`;
});
grid.classList.add("fade");
},150);
}

// إضافة المنتج + إشعار
function add(name,price){
cart.push({name,price});
renderCart();
showNotif();
}

// إشعار الإضافة
function showNotif(){
let n = document.getElementById("notif");
n.style.display = "block";
setTimeout(()=>{ n.style.display = "none"; },1500);
}

// عرض السلة
function renderCart(){
let box = document.getElementById("cartItems");
box.innerHTML = "";

// تلخيص المنتجات المكررة
let summary = {};
cart.forEach(i=>{
if(summary[i.name]){
summary[i.name].qty += 1;
}else{
summary[i.name] = {price: i.price, qty:1};
}
});

let total = 0;
for(let key in summary){
let item = summary[key];
let itemTotal = item.price * item.qty;
total += itemTotal;
box.innerHTML += `<div style="margin-bottom:8px;">
<strong>${key}</strong><br>
السعر لكل وحدة: ${item.price} جنيه<br>
الكمية: ${item.qty}<br>
المجموع: ${itemTotal} جنيه
</div>`;
}

box.innerHTML += `<hr><div><strong>السعر الكلي: ${total} جنيه</strong></div>`;
}

// فتح وغلق السلة
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

// إرسال الطلب + الموقع
function sendOrder(){
if(cart.length === 0){
alert("السلة فاضية!");
return;
}

navigator.geolocation.getCurrentPosition(function(position){
let lat = position.coords.latitude;
let lon = position.coords.longitude;
let locationLink = `https://maps.google.com/?q=${lat},${lon}`;

let msg = "🛒 طلب جديد:%0A";

let summary = {};
cart.forEach(i=>{
if(summary[i.name]){
summary[i.name].qty += 1;
}else{
summary[i.name] = {price: i.price, qty:1};
}
});

for(let key in summary){
let item = summary[key];
let itemTotal = item.price * item.qty;
msg += `${key} - ${item.qty} وحدة - ${itemTotal} جنيه%0A`;
}

let address = document.getElementById("address").value;
msg += `%0A📍 الموقع:%0A${locationLink}`;
msg += `%0A🏠 عنوان إضافي: ${address}`;

window.open(`https://wa.me/249994501781?text=${msg}`);

}, function(){
alert("فشل في تحديد الموقع ❌ شغل الـ GPS");
});
}

// تحميل قسم مأكولات أولاً
load('food',document.querySelector(".tab"));
</script>

</body>
</html>
